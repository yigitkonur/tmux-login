# tmux-login managed config.
# Sourced from your ~/.tmux.conf via the marker block written by install.sh.
# https://github.com/yigitkonur/tmux-login

# ─── server / session sane defaults ─────────────────────────────────────────
set  -g  default-terminal   "tmux-256color"
set  -ag terminal-overrides ',xterm-256color:RGB,*:RGB,xterm*:RGB,alacritty:RGB,ghostty*:RGB,wezterm*:RGB'

# vim/nvim Esc is instant — default 500ms is jarring.
set -g escape-time 0
# nvim :checktime fires on tmux window-switch.
set -g focus-events on
# Click-to-focus, scrollback. Terminal.app users may want this off — toggle
# in your own ~/.tmux.conf below the marker block.
set -g mouse on
# OSC 52 for clipboard out of nested apps. Pairs with the pbcopy fallback in
# copy-mode-vi below.
set -g set-clipboard external
# 100k lines of scrollback — adequate for multi-day shells.
set -g history-limit 100000
# Humans index from 1.
set  -g  base-index 1
setw -g  pane-base-index 1
# When you close window 2 of [1,2,3], renumber to [1,2].
set -g renumber-windows on
# Status at top is closer to natural reading flow.
set -g status-position top
# Allow OSC passthrough so nested image protocols (Ghostty/Kitty) work.
set -gq allow-passthrough on

setw -g mode-keys vi

# ─── status line ────────────────────────────────────────────────────────────
set -g status-style                  'bg=default,fg=#88c0d0'
set -g status-left                   '#[fg=#a3be8c,bold] #S #[default]'
set -g status-right                  '#[fg=#5e81ac]%H:%M #[fg=#88c0d0]%Y-%m-%d#[default]'
set -g window-status-format          '  #I:#W  '
set -g window-status-current-format  '#[fg=#a3be8c,bold] #I:#W #[default]'
set -g status-interval 3

# ─── universal menu hotkey ──────────────────────────────────────────────────
# bind -n means no prefix needed. M-s / Alt-s opens the picker as a popup.
# LAUNCHER_POPUP=1 lets the binary detect "I'm already inside a popup" and
# avoid re-spawning display-popup recursively.
bind -n M-s display-popup -E -w 80% -h 70% -e LAUNCHER_POPUP=1 'tmux-login pick --no-popup'
# Alias for users with vim/emacs M-s clashes.
bind -n C-o display-popup -E -w 80% -h 70% -e LAUNCHER_POPUP=1 'tmux-login pick --no-popup'
# Help: M-? opens help mode in a smaller popup.
bind -n M-? display-popup -E -w 60% -h 50% -e LAUNCHER_POPUP=1 'tmux-login pick --mode help --no-popup'

# ─── window keymap (Chrome / macOS Alt+letter parity) ───────────────────────
bind -n M-t new-window -c "#{pane_current_path}"
bind -n M-w kill-window
bind -n M-1 select-window -t :=1
bind -n M-2 select-window -t :=2
bind -n M-3 select-window -t :=3
bind -n M-4 select-window -t :=4
bind -n M-5 select-window -t :=5
bind -n M-6 select-window -t :=6
bind -n M-7 select-window -t :=7
bind -n M-8 select-window -t :=8
bind -n M-9 select-window -t :=9
bind -n M-] next-window
bind -n M-[ previous-window
bind -n M-r command-prompt -I "#W" "rename-window '%%'"

# ─── pane keymap ────────────────────────────────────────────────────────────
bind -n M-n split-window -h -c "#{pane_current_path}"
bind -n M-N split-window -v -c "#{pane_current_path}"
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R
bind -n M-z resize-pane -Z
bind -n M-q kill-pane
bind -n M-d detach-client

# ─── copy-mode + pbcopy fallback ────────────────────────────────────────────
# Modern terminals (iTerm2, Ghostty, Wezterm) honor OSC 52 transparently via
# `set-clipboard external`; Terminal.app does not. The double-write to pbcopy
# covers both at zero cost on macOS. (Linux users: the pbcopy line is a no-op
# unless they install xclip and alias it; the OSC 52 path is sufficient there.)
bind -T copy-mode-vi y                  send-keys -X copy-pipe-and-cancel "pbcopy 2>/dev/null || cat >/dev/null"
bind -T copy-mode-vi Enter              send-keys -X copy-pipe-and-cancel "pbcopy 2>/dev/null || cat >/dev/null"
bind -T copy-mode-vi MouseDragEnd1Pane  send-keys -X copy-pipe-and-cancel "pbcopy 2>/dev/null || cat >/dev/null"

# ─── C-g bypass keytable ────────────────────────────────────────────────────
# Press C-g once to enter bypass — every M-* binding above falls through so
# the inner app (vim, emacs, htop) can see Alt-keys. Press C-g again to
# restore. Cheap insurance for vim users with Alt-mappings.
bind -n C-g switch-client -T tmux-login-bypass
bind -T tmux-login-bypass C-g switch-client -T root

# ─── prefix preserved as escape hatch ───────────────────────────────────────
# C-b is the upstream default and remains available for power-user chord
# access. Daily ops never need it.
